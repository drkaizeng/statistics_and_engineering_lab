name: python_mendelian_randomisation

on:
  pull_request:
    branches:
      - main
    paths:
      - "python_projects/mendelian_randomisation/**"
      - ".github/workflows/python_mendelian_randomisation.yml"
  push:
    tags:
      - "python/mendelian_randomisation/v*.*.*"
      - "test/python/mendelian_randomisation/v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_and_build:
    name: Test and Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: &python-versions
          - "3.13"
          - "3.14"
    permissions:
      contents: read
      pull-requests: write
      checks: write

    defaults:
      run:
        shell: bash -euo pipefail {0}
        working-directory: ./python_projects/mendelian_randomisation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install repo
        run: uv sync --locked --all-groups

      - name: Linting and format/type checks
        run: |
          uv run ruff check
          uv run ruff format --check
          uv run ty check

      - name: Run tests
        run: uv run pytest --junitxml report.xml --cov=src --cov-report=xml:coverage.xml

      - name: Show test report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Test results
          path: ./python_projects/mendelian_randomisation/report.xml
          reporter: java-junit

      - name: Show test coverage
        uses: 5monkeys/cobertura-action@master
        if: github.event_name == 'pull_request'
        with:
          path: ./python_projects/mendelian_randomisation/coverage.xml
          minimum_coverage: 75
          skip_covered: false
          fail_below_threshold: true
          show_missing: true
          show_line: true
          show_branch: true
          link_missing_lines: true
          link_missing_lines_source_dir: ./python_projects/mendelian_randomisation/src

      - name: Build Python wheel
        run: uv build

      - name: Test Python wheel
        run: |
          uv venv test-env
          source test-env/bin/activate
          uv pip install dist/*.whl
          simulate_output=$(simulate 2>&1) || true
          if [[ ! "$simulate_output" =~ ^"Usage: simulate" ]]; then
            echo "Unexpected simulate output: $simulate_output"
            exit 1
          fi
          estimate_output=$(estimate 2>&1) || true
          if [[ ! "$estimate_output" =~ ^"Usage: estimate" ]]; then
            echo "Unexpected estimate output: $estimate_output"
            exit 1
          fi
          deactivate
          rm -r test-env

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-${{ matrix.python-version }}
          path: ./python_projects/mendelian_randomisation/dist/
          if-no-files-found: error
          retention-days: 1

  prepare_for_publishing:
    name: Prepare for publishing
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: test_and_build
    defaults:
      run:
        shell: bash -euo pipefail {0}
    outputs:
      IS_PRODUCTION_RELEASE: ${{ steps.get_release_type.outputs.IS_PRODUCTION_RELEASE }}

    steps:
      - name: Download and put artifacts together
        uses: actions/download-artifact@v7
        with:
          pattern: build-artifacts-*
          merge-multiple: true
          path: ./dist/

      - name: Upload all artifacts
        uses: actions/upload-artifact@v6
        with:
          name: all-build-artifacts
          path: ./dist/
          if-no-files-found: error
          retention-days: 1

      - name: Determine release type
        id: get_release_type
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/python/ ]]; then
            echo "IS_PRODUCTION_RELEASE=true" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" =~ ^refs/tags/test/python/ ]]; then
            echo "IS_PRODUCTION_RELEASE=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected GITHUB_REF = $GITHUB_REF"
            exit 1
          fi

  publish:
    name: Publish to repository
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: prepare_for_publishing
    permissions:
      id-token: write
    uses: ./.github/workflows/publish_to_pypi.yml
    with:
      is_production_release: ${{ needs.prepare_for_publishing.outputs.IS_PRODUCTION_RELEASE == 'true' }}
      working_directory: ./python_projects/mendelian_randomisation
      artifact_download_name: all-build-artifacts
      git_tag_ref: ${{ github.ref }}
